services:
  envelops:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      ENVELOPS_MASTER_KEY: ${ENVELOPS_MASTER_KEY:?generate with: openssl rand -hex 32}
      ENVELOPS_BASE_URL: ${ENVELOPS_BASE_URL:-http://localhost:3000}
      # Caddy is the only ingress (port 3000 is `expose`, not `ports`), so
      # X-Forwarded-For reaches us from a trusted hop and per-IP rate limits
      # can key off it.
      ENVELOPS_TRUST_PROXY: "1"
      DATABASE_URL: file:/data/envelops.db
    volumes:
      - envelops-data:/data
    expose:
      - "3000"

  # Reverse proxy for automatic TLS. The app is only reachable through this.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on: [envelops]

volumes:
  envelops-data:
  caddy-data:
  caddy-config:
